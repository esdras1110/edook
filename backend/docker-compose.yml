version: '3.8'

services:

  db:
    image: postgres:15-alpine
    container_name: postgres_sistema

    environment:
      POSTGRES_USER: admin_sistema
      POSTGRES_PASSWORD: "Ed00k@1234"
      POSTGRES_DB: Edook
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo

    ports:
      - "5433:5432"

    volumes:
      - ./banco_de_dados/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: edook_backend

    ports:
      - "8080:8080"

    depends_on:
      - db

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/Edook
      SPRING_DATASOURCE_USERNAME: admin_sistema
      SPRING_DATASOURCE_PASSWORD: "Ed00k@1234"
      TZ: America/Sao_Paulo

volumes:
  postgres_data: